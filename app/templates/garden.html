<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Ведьмин Сад</title>
    <style>
        body {
            font-family: sans-serif;
            background: #1a1a2e;
            color: #eee;
            padding: 20px;
            max-width: 500px;
            margin: 0 auto;
        }
        .bed {
            border: 2px solid #444;
            border-radius: 10px;
            padding: 15px;
            margin: 10px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #16213e;
        }
        .empty { color: #666; }
        .ready { border-color: #6f6; }
        .growing { border-color: #aa6; }
        button {
            background: #7b2d8e;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
        }
        button:hover { background: #9b3db0; }
        select {
            padding: 8px;
            border-radius: 5px;
            font-size: 14px;
        }
        .error {
            color: #f66;
            margin-top: 10px;
        }
        .success {
            color: #6f6;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <h1>🌱 Твой сад</h1>
    <div id="garden">
        {% for bed in beds %}
        <div class="bed {% if bed.is_ready %}ready{% elif bed.plant_name %}growing{% endif %}">
            <div>
                {% if bed.plant_name %}
                <strong>{{ bed.plant_name }}</strong><br>
                Влажность: <span id="moisture-{{ bed.id }}">{{ bed.moisture }}</span>%<br>
                {% if bed.is_ready %}
                    ✅ <strong>Готово к сбору!</strong>
                {% else %}
                    ⏳ Осталось: <span id="timeleft-{{ bed.id }}">{{ bed.time_left }}</span>
                    ({{ bed.ready_at }})
                    <br>
                    <button onclick="waterBed('{{ bed.id }}')" style="margin-top:8px; font-size:14px;">
                        💧 Полить
                    </button>
                {% endif %}
            {% else %}
                <span class="empty">Пустая грядка</span>
            {% endif %}
            </div>
        </div>
        {% endfor %}
    </div>

    <h2>Посадить растение</h2>
    <select id="plantSelect">
        {% for p in plants %}
        <option value="{{ p.id }}">{{ p.name }} ({{ p.growth_time }} мин)</option>
        {% endfor %}
    </select>
    <button onclick="plantSeed()">Посадить!</button>
    <div id="message"></div>

    <script>
        async function plantSeed() {
            const plantId = document.getElementById("plantSelect").value;
            const msg = document.getElementById("message");
            msg.className = "";
            msg.textContent = "Сажаем...";

            try {
                const response = await fetch("/api/game/garden/plant", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ plant_id: parseInt(plantId) })
                });

                if (response.ok) {
                    msg.className = "success";
                    msg.textContent = "🌿 Посажено! Обнови страницу, чтобы увидеть грядку.";
                } else {
                    const error = await response.json();
                    msg.className = "error";
                    msg.textContent = "❌ " + error.detail;
                }
            } catch (e) {
                msg.className = "error";
                msg.textContent = "❌ Ошибка соединения";
            }
        }
        async function waterBed(bedId) {
            const msg = document.getElementById("message");
            msg.className = "";
            msg.textContent = "Поливаем...";

            try {
                const response = await fetch("/api/game/garden/water", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ bed_id: bedId })
                });

                if (response.ok) {
                    const data = await response.json();
                    msg.className = "success";
                    msg.textContent = `💧 Полито! Влажность: ${data.moisture}%, энергия: ${data.energy_left}`;
                    // Обновим влажность на странице
                    document.getElementById(`moisture-${bedId}`).textContent = data.moisture;
                    // Обновим время и оставшееся время — перезагрузим страницу (просто и надёжно)
                    setTimeout(() => location.reload(), 800);
                } else {
                    const error = await response.json();
                    msg.className = "error";
                    msg.textContent = "❌ " + error.detail;
                }
            } catch (e) {
                msg.className = "error";
                msg.textContent = "❌ Ошибка соединения";
            }
        }
    </script>
</body>
</html>
